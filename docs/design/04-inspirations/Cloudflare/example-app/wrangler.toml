name = "env-bindings-example"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# KV namespace binding (create with: wrangler kv namespace create EXAMPLE_KV)
[[kv_namespaces]]
binding = "EXAMPLE_KV"
id = "xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

# R2 bucket binding (create with: wrangler r2 bucket create example-bucket)
[[r2_buckets]]
binding = "EXAMPLE_R2"
bucket_name = "example-bucket"

# D1 database binding (create with: wrangler d1 create example-db)
[[d1_databases]]
binding = "DB"
database_name = "example-db"
database_id = "xxxxxxxx-xxxx-xxxx-xxxxxxxxxxxxxxxx"
