#
# INHERITABLE (from top-level; override per env):
#   main, compatibility_date, compatibility_flags, route/routes, workers_dev,
#   build, minify, node_compat, etc.
#
# NON-INHERITABLE (must be specified per env; top-level is default env only):
#   vars, kv_namespaces, r2_buckets, d1_databases, services, and other bindings.

