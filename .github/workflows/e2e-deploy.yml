name: E2E deploy

# Deploys examples/storefront-auth to real Prisma Cloud, verifies the live
# service-to-service round trip (the storefront renders auth's /verify
# response — the Connection primitive end to end), then destroys it. Requires
# a repo secret PRISMA_SERVICE_TOKEN (a Prisma Console service token) and a
# repo variable PRISMA_WORKSPACE_ID (the target workspace id — not sensitive,
# so a variable, not a secret). A human must create both in the repo's Actions
# settings before this runs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Fixed group (not per-ref): only one real-cloud deploy runs at a time.
# cancel-in-progress is false because killing a run mid-deploy or mid-destroy
# would orphan cloud resources with nothing left to clean them up.
concurrency:
  group: e2e-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy, verify, destroy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Secrets aren't available to forked-PR workflow runs; skip rather than
    # fail loudly on a run that could never have them.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      PRISMA_SERVICE_TOKEN: ${{ secrets.PRISMA_SERVICE_TOKEN }}
      # A workspace id is an identifier, not a credential, so it lives as a
      # repo variable (vars.*), not a secret.
      PRISMA_WORKSPACE_ID: ${{ vars.PRISMA_WORKSPACE_ID }}
      # The stack name becomes the PDP Project name. A per-run name keeps this
      # ephemeral CI deploy from colliding with — or destroying — a standing
      # demo in the shared workspace. Passed as `makerkit`'s `--name` override
      # (deploy-cli.md) — hex.ts's own name is the local-dev default.
      STOREFRONT_STACK_NAME: storefront-auth-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ALCHEMY_PASSWORD
        run: bash examples/scripts/generate-alchemy-password.sh

      # storefront-auth's own `build` script is a no-op — turbo's ^build
      # (from the workspace deps in its package.json) builds the two hexes.
      # `pnpm build` alone wouldn't trigger that, so run it through turbo.
      - name: Build
        working-directory: examples/storefront-auth
        run: pnpm turbo run build --filter @makerkit/example-storefront-auth...

      - name: Deploy
        # Do not use the package's `deploy` script: it sources ../../.env,
        # which doesn't exist in CI; env vars are already set on this job.
        # The CLI must run under BUN: Load imports the app's service modules,
        # and auth's imports `bun` (SQL) — under node that import throws.
        # `bun node_modules/.bin/makerkit` also sets npm_config_user_agent=bun,
        # which the spawned `alchemy` launcher uses to re-exec itself under bun
        # when it evaluates the generated stack (which imports hex.ts again).
        working-directory: examples/storefront-auth
        run: bun node_modules/.bin/makerkit deploy hex.ts --name "$STOREFRONT_STACK_NAME"

      - name: Verify the round trip (storefront -> auth)
        working-directory: examples/storefront-auth
        run: bash scripts/e2e-verify.sh

      - name: Destroy
        # Always runs, even on failure above: alchemy state is local to this
        # runner and dies with it, so a failed run without destroy leaves
        # orphaned cloud resources nobody else can clean up.
        if: always()
        working-directory: examples/storefront-auth
        run: bash ../scripts/destroy-guard.sh "" hex.ts "$STOREFRONT_STACK_NAME"

      # ---- makerkit-hello: the SERVICE-root path + the idempotent-redeploy
      # proof. storefront-auth above covers the hex root; hello covers a bare
      # service deployed as the application (LowerOptions.bundle, not bundles)
      # and the node-kind determinism claim: a second deploy of an unchanged
      # build must be a no-op (the Next path is knowingly non-deterministic —
      # see deploy-cli.md — so the noop assertion lives here, not above).
      - name: Deploy hello (service root)
        working-directory: examples/makerkit-hello
        env:
          HELLO_STACK_NAME: hello-ci-${{ github.run_id }}
        run: bash scripts/e2e-deploy-verify.sh

      - name: Redeploy hello — must be a no-op
        working-directory: examples/makerkit-hello
        env:
          HELLO_STACK_NAME: hello-ci-${{ github.run_id }}
        run: bash scripts/e2e-redeploy-noop.sh

      - name: Destroy hello
        if: always()
        working-directory: examples/makerkit-hello
        env:
          HELLO_STACK_NAME: hello-ci-${{ github.run_id }}
        run: bash ../scripts/destroy-guard.sh "hello " src/service.ts "$HELLO_STACK_NAME"
