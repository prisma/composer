name: E2E deploy

# Deploys examples/storefront-auth to real Prisma Cloud, verifies the live
# service-to-service round trip (the storefront renders auth's /verify
# response — the Connection primitive end to end), then destroys it. Requires
# a repo secret PRISMA_SERVICE_TOKEN (a Prisma Console service token) and a
# repo variable PRISMA_WORKSPACE_ID (the target workspace id — not sensitive,
# so a variable, not a secret). A human must create both in the repo's Actions
# settings before this runs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Fixed group (not per-ref): only one real-cloud deploy runs at a time.
# cancel-in-progress is false because killing a run mid-deploy or mid-destroy
# would orphan cloud resources with nothing left to clean them up.
concurrency:
  group: e2e-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy, verify, destroy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Secrets aren't available to forked-PR workflow runs; skip rather than
    # fail loudly on a run that could never have them.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      PRISMA_SERVICE_TOKEN: ${{ secrets.PRISMA_SERVICE_TOKEN }}
      # A workspace id is an identifier, not a credential, so it lives as a
      # repo variable (vars.*), not a secret.
      PRISMA_WORKSPACE_ID: ${{ vars.PRISMA_WORKSPACE_ID }}
      # The stack name becomes the PDP Project name. A per-run name keeps this
      # ephemeral CI deploy from colliding with — or destroying — a standing
      # demo in the shared workspace. alchemy.run.ts reads it.
      STOREFRONT_STACK_NAME: storefront-auth-ci-${{ github.run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ALCHEMY_PASSWORD
        # Fresh CI state every run — nothing to decrypt, so a random password
        # is fine. Mask it before it ever reaches $GITHUB_ENV / logs.
        run: |
          password="$(openssl rand -hex 24)"
          echo "::add-mask::$password"
          echo "ALCHEMY_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Build
        working-directory: examples/storefront-auth
        run: pnpm build

      - name: Deploy
        # Never `pnpm exec alchemy` or plain `bunx alchemy` — the CLI must run
        # under bun (`--bun`) or it fails with "Cannot find package 'bun'".
        # Do not use the package's `deploy` script: it sources ../../.env,
        # which doesn't exist in CI; env vars are already set on this job.
        working-directory: examples/storefront-auth
        run: bunx --bun alchemy deploy --yes

      - name: Extract storefront URL
        id: url
        working-directory: examples/storefront-auth
        # The app is a hex, so the stack root exposes no `outputs.url` (boundary
        # ports are future work). Read the storefront service's promoted URL
        # from its Deployment state instead.
        run: |
          set -euo pipefail
          output_file="$(find .alchemy/state -name 'storefront-deploy.json' | head -1)"
          if [ -z "$output_file" ]; then
            echo "No storefront-deploy state found under .alchemy/state — deploy did not persist state."
            exit 1
          fi
          url="$(node -e "console.log(JSON.parse(require('fs').readFileSync('$output_file','utf8')).attr?.deployedUrl ?? '')")"
          if [ -z "$url" ]; then
            echo "storefront-deploy state has no attr.deployedUrl: $(cat "$output_file")"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Storefront URL: $url"

      - name: Verify the round trip (storefront -> auth)
        # The storefront page renders "Auth /verify says: 200 {"ok":true}" — a
        # live call to the auth service through the Connection primitive. Retry:
        # a version cold-starts for ~15s after deploy (PRO-200), and auth's
        # Postgres direct connection can 503 on the first hit after idle
        # (FT-5219) but recovers on the next — so we poll until a clean 200.
        env:
          URL: ${{ steps.url.outputs.url }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 180))
          body=""
          while [ "$SECONDS" -lt "$deadline" ]; do
            body="$(curl -sS --max-time 30 "$URL" || true)"
            clean="$(printf '%s' "$body" | sed -e 's/<!--[^>]*-->//g' -e 's/&quot;/"/g')"
            if printf '%s' "$clean" | grep -q 'Auth /verify says: 200 {"ok":true}'; then
              echo "Round trip OK — storefront rendered auth's 200 {\"ok\":true}"
              exit 0
            fi
            sleep 6
          done
          echo "Round trip never rendered a clean 200 within the deadline. Last body:"
          printf '%s' "$body" | head -c 3000
          exit 1

      - name: Destroy
        # Always runs, even on failure above: alchemy state is local to this
        # runner and dies with it, so a failed run without destroy leaves
        # orphaned cloud resources nobody else can clean up.
        if: always()
        working-directory: examples/storefront-auth
        run: |
          set -euo pipefail
          if [ ! -d .alchemy ]; then
            echo "No .alchemy state dir — deploy never started, nothing to destroy."
            exit 0
          fi
          bunx --bun alchemy destroy --yes
