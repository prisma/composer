name: Publish to npm

# Source-of-truth model:
#   The version comes from the root `package.json` `version` field. Maintainers
#   advance it via `pnpm bump-minor`. This workflow can never publish a version
#   other than what is committed at HEAD.
#
# Trigger model:
#   - push to `main` with the root `version` unchanged → publish `<base>-dev.N`
#     under dist-tag `dev`.
#   - push to `main` with the root `version` changed   → publish `<base>` under
#     dist-tag `latest` and create a GitHub Release. This is how a merged
#     release-bump PR auto-ships.
#   - workflow_dispatch → publish `<base>` under the chosen dist-tag (default
#     `latest`); also the dry-run path.

on:
  push:
    branches: [main]
    tags: ["!**"]
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag (e.g., latest, dev, beta)"
        required: true
        default: "latest"
        type: string
      dry-run:
        description: "Dry-run only (build + pack + gate, no npm publish, no GitHub Release)."
        required: false
        default: true
        type: boolean

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    # Only `main` may produce a real publish. A dry-run dispatch is permitted from
    # any branch so maintainers can validate the pipeline (build + pack + gate +
    # `publish --dry-run`) before merging changes that touch publishing. The
    # dry-run path performs no registry writes and skips the GitHub Release step.
    if: ${{ github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'true') }}
    permissions:
      contents: write # Required to create the GitHub Release + tag for stable publishes
      id-token: write # Required for npm OIDC Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # determine-version.ts compares the root `package.json` version at
          # `github.event.before` to HEAD to decide dev vs latest; a multi-commit
          # push can place `before` arbitrarily far back, so fetch full history.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Configure npm
        run: pnpm config set registry https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_DIST_TAG: ${{ github.event.inputs.dist-tag }}
          # `before` is the ref `main` pointed at before this push;
          # determine-version.ts reads root package.json there to detect release
          # bumps. Empty for workflow_dispatch, which the script also handles.
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: node scripts/determine-version.ts

      - name: Set package versions
        run: node scripts/set-version.ts "${{ steps.version.outputs.version }}"

      - name: Build packages
        run: pnpm build

      # Publish-time gate: packs every publishable package and fails if a
      # resolved package.json would carry a workspace:/catalog: specifier or a
      # non-exact internal pin into the registry.
      - name: Check publish dependency specifiers
        run: pnpm check:publish-deps

      # Dry-run path: exercises the full pipeline (pack, dependency rewriting)
      # without touching the registry. Use from any branch via workflow_dispatch.
      - name: Publish packages (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry-run == 'true' }}
        run: node scripts/publish-packages.mjs --tag "${{ steps.version.outputs.tag }}" --dry-run

      # NODE_AUTH_TOKEN is intentionally NOT set. npm detects the OIDC environment
      # (id-token: write) and authenticates via Trusted Publishing automatically;
      # setting NODE_AUTH_TOKEN to any value — even empty — would block OIDC.
      # NPM_CONFIG_PROVENANCE enables provenance attestations (requires a public repo).
      - name: Publish packages
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.dry-run != 'true' }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: node scripts/publish-packages.mjs --tag "${{ steps.version.outputs.tag }}"

      # Lightweight git tag for non-stable publishes (dev / beta). Stable publishes
      # get a tag via `gh release create` below. Idempotent: skip if v$VERSION exists.
      - name: Create lightweight git tag for non-stable publishes
        if: ${{ steps.version.outputs.tag != 'latest' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry-run != 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; skipping"
          else
            gh api "repos/$GITHUB_REPOSITORY/git/refs" \
              -X POST \
              -f ref="refs/tags/v$VERSION" \
              -f "sha=$GITHUB_SHA"
          fi

      # Emit a GitHub Release for stable publishes only (dist-tag `latest`).
      # Notes are auto-generated from the commits/PRs since the previous tag.
      # Idempotent on rerun: edit an existing Release rather than re-create it.
      - name: Create GitHub Release for stable publishes
        if: ${{ steps.version.outputs.tag == 'latest' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry-run != 'true') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release edit "v$VERSION" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION"
          else
            gh release create "v$VERSION" \
              --target "$GITHUB_SHA" \
              --title "v$VERSION" \
              --generate-notes
          fi
